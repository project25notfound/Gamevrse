<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamevrse</title>
<style>
  :root {
    --bg:#041118;
    --card:#071821;
    --muted:#9aa6b0;
    --neon1:#00f0ff;
    --neon2:#ff5ef0;
    --accent:#7CFC00;
  }
  * {box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
  body {
    background: radial-gradient(1000px 500px at 10% 12%, rgba(0,240,255,0.03), transparent),
                radial-gradient(700px 350px at 90% 88%, rgba(255,94,240,0.02), transparent),
                var(--bg);
    color:#e6f0f6; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  header {display:flex;justify-content:center;align-items:center;padding:18px 28px;border-bottom:1px solid rgba(255,255,255,0.03);}
  .logo {font-weight:800;letter-spacing:1px;font-size:clamp(18px, 4vw, 24px);}
  .logo .glow {padding:6px 10px;border-radius:8px;background:linear-gradient(90deg, rgba(0,240,255,0.06), rgba(255,94,240,0.04));}
  .container {padding:clamp(16px, 4vw, 28px);max-width:1200px;margin:0 auto;}
  .intro h1{font-size:clamp(24px, 5vw, 32px);margin-bottom:8px;text-align:center;}
  .muted{color:var(--muted);font-size:clamp(12px, 2.5vw, 14px);text-align:center;margin-bottom:24px;}
  .game-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:clamp(12px, 2vw, 16px);
    margin-top:12px;
  }
  .game-card {
    background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
    border-radius:12px;
    padding:clamp(12px, 3vw, 16px);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    border:1px solid rgba(255,255,255,0.03);
    box-shadow:0 6px 20px rgba(2,6,12,0.6);
    transition:transform .12s, box-shadow .12s;
  }
  .game-card:hover {transform:translateY(-8px);}
  .thumb {
    height:clamp(60px, 15vw, 72px);
    width:clamp(60px, 15vw, 72px);
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:clamp(24px, 6vw, 28px);
    background:linear-gradient(135deg, rgba(0,240,255,0.06), rgba(255,94,240,0.04));
  }
  .title {font-weight:600;font-size:clamp(13px, 3vw, 15px);text-align:center;}
  .cta {width:100%;display:flex;justify-content:center;}
  .neon-btn {
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border:1px solid rgba(255,255,255,0.04);
    padding:clamp(6px, 2vw, 8px) clamp(10px, 3vw, 12px);
    border-radius:10px;
    color:#cfeffd;
    cursor:pointer;
    transition:transform .14s, box-shadow .14s;
    font-size:clamp(12px, 2.5vw, 14px);
    white-space:nowrap;
  }
  .neon-btn:hover {transform:translateY(-3px);}
  .neon-btn:disabled {opacity:0.5;cursor:not-allowed;}
  .coming .thumb{opacity:0.5;}
  .footer {
    padding:clamp(12px, 3vw, 14px) clamp(16px, 4vw, 28px);
    border-top:1px solid rgba(255,255,255,0.03);
    text-align:center;
    margin-top:clamp(20px, 5vw, 24px);
    color:var(--muted);
    font-size:clamp(11px, 2vw, 13px);
  }
  @media (max-width:480px) {
    .game-grid {grid-template-columns:repeat(2, 1fr);gap:12px;}
    .logo {font-size:20px;}
    header {padding:12px 16px;}
  }
  @media (min-width:481px) and (max-width:768px) {
    .game-grid {grid-template-columns:repeat(3, 1fr);}
  }
  @media (min-width:769px) and (max-width:1024px) {
    .game-grid {grid-template-columns:repeat(4, 1fr);}
  }
  @media (min-width:1025px) {
    .game-grid {
      grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
      max-width:900px;
      margin:12px auto 0;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="glow">GAMEVRSE</span></div>
</header>

<main class="container">
  <section class="intro">
    <h1>Welcome to Gamevrse</h1>
    <p class="muted">Play multiplayer games with friends online!</p>

    <section class="game-grid">

      <div class="game-card">
        <div class="thumb">🕵</div>
        <div class="title">Wordscape</div>
        <div class="cta">
          <button class="neon-btn" onclick="goToGame('wordscape')">Play</button>
        </div>
      </div>

      <div class="game-card">
        <div class="thumb">♠</div>
        <div class="title">Blackjack Roulette</div>
        <div class="cta">
          <button class="neon-btn" onclick="window.open('https://gamevrse-blackjack.onrender.com', '_blank')">Play</button>
        </div>
      </div>

      <div class="game-card">
        <div class="thumb">🎨</div>
        <div class="title">ColorRush</div>
        <div class="cta">
          <button class="neon-btn" onclick="window.open('https://gamevrse-colorrush.onrender.com', '_blank')">Play</button>
        </div>
      </div>

      <div class="game-card">
        <div class="thumb">🎯</div>
        <div class="title">Trivia Battle</div>
        <div class="cta">
          <button class="neon-btn" onclick="goToGame('trivia')">Play</button>
        </div>
      </div>

      <div class="game-card">
        <div class="thumb">🎤</div>
        <div class="title">Rankly</div>
        <div class="cta">
          <button class="neon-btn" onclick="window.open('https://gamevrse-rankly.onrender.com', '_blank')">Play</button>
        </div>
      </div>

      <div class="game-card">
        <div class="thumb">🎲</div>
        <div class="title">Dice Duel</div>
        <div class="cta">
          <button class="neon-btn" onclick="goToGame('dice')">Play</button>
        </div>
      </div>

      <div class="game-card">
        <div class="thumb">🏁</div>
        <div class="title">Speed Racer</div>
        <div class="cta">
          <button class="neon-btn" onclick="goToGame('racer')">Play</button>
        </div>
      </div>

      <div class="game-card">
        <div class="thumb">🧩</div>
        <div class="title">Puzzle Match</div>
        <div class="cta">
          <button class="neon-btn" onclick="goToGame('puzzle')">Play</button>
        </div>
      </div>

      <div class="game-card">
        <div class="thumb">⚔️</div>
        <div class="title">Battle Arena</div>
        <div class="cta">
          <button class="neon-btn" onclick="goToGame('arena')">Play</button>
        </div>
      </div>

      <div class="game-card coming">
        <div class="thumb">?</div>
        <div class="title">Coming Soon</div>
        <div class="cta">
          <button class="neon-btn" disabled>Coming Soon</button>
        </div>
      </div>

    </section>
  </section>
</main>

<footer class="footer">
  <small>Gamevrse • Multiplayer Hub • More Coming Soon</small>
</footer>

<script>
function goToGame(game){
  window.location.href = "/games/" + game + ".html";
}
</script>

</body>
</html>
